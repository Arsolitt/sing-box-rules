name: Update Rule Sets

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Update rule sets
        run: go run ./cmd/sing-box-rules -dummy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
